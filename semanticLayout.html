<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Layout Structure</title>
</head>
<body>
    <header>
        <nav>Home About Other Stuff</nav> <!-- flexbox -->
    </header> 

    <section id="hero"></section> <!-- full-wdith hero image -->

    <main>

        <section id="courses">...</section> <!-- What have you learned -->
        <section id="projects">...</section> <!-- Links to Web Projects -->
    </main>

    <footer> <!-- flexbox-->
        <nav id="footer"></nav>
        <section id="copy"></section>
        <section id="contact"></section>
    </footer>
</body>
</html>
